name: CI/CD Pipeline - Frontend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          cd frontend
          npm install --prefer-offline --no-audit --no-fund

      - name: Executar lint
        run: |
          cd frontend
          npm run lint || echo "No lint script found"

      - name: Executar testes
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false || echo "No test script found"

      - name: Build do projeto
        run: |
          cd frontend
          npm run build || echo "No build script found"
        env:
          CI: false

      - name: Upload dos artefatos de build
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

      - name: Upload dos relatorios de teste
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: |
            frontend/coverage/
            frontend/test-results/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Executar auditoria de seguranca
        run: |
          cd frontend
          npm audit --production || echo "Security vulnerabilities found"

      - name: Verificar vulnerabilidades em dependencias
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'frontend'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Download dos artefatos de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
    
