name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint || true
    
    - name: Test
      run: npm test -- --watchAll=false || true
    
    - name: Build
      run: npm run build
      env:
        CI: false
    
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: frontend/build/