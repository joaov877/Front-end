name: CI/CD Pipeline - Frontend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm install --prefer-offline --no-audit --no-fund
          else
            mkdir -p frontend
            cd frontend
            npm init -y
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Verificar formato do codigo
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run format:check || echo "No format script found"
          fi

      - name: Executar lint
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run lint || echo "No lint script found"
          fi

      - name: Executar testes
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm test -- --coverage --watchAll=false || echo "No test script found"
          fi

      - name: Build do projeto
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run build || echo "No build script found"
          fi
        env:
          CI: false

      - name: Upload dos artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
        if: always()

      - name: Upload dos relatorios de teste
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: |
            frontend/coverage/
            frontend/test-results/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Executar auditoria de seguranca
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm audit --production || echo "Security vulnerabilities found"
          fi

      - name: Verificar vulnerabilidades em dependencias
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Analisar tamanho do bundle
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run build -- --stats || echo "No build stats"
            npx webpack-bundle-analyzer build/bundle-stats.json --mode static --report build/bundle-report.html || echo "No bundle stats found"
          fi

      - name: Upload do relatorio de bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: frontend/build/bundle-report.html
          retention-days: 7
        if: always()

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Download dos artefatos de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Deploy para Preview
        run: |
          echo "Deploying preview for PR #${{ github.event.pull_request.number }}"
        env:
          PREVIEW_URL: "https://preview-${{ github.event.pull_request.number }}.seudominio.com"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://seudominio.com

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Download dos artefatos de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Deploy para Producao
        run: |
          echo "Deploying to production..."
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
