name: CI/CD Pipeline - Frontend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop


defaults:
  run:
    working-directory: frontend

jobs:
  # Build e Testes
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit --no-fund
      
      - name: Verificar formato do código
        run: npm run format:check || echo "No format script found"
      
      - name: Executar lint
        run: npm run lint || echo "No lint script found"
      
      - name: Executar testes
        run: npm test -- --coverage --watchAll=false || echo "No test script found"
      
      - name: Build do projeto
        run: npm run build
        env:
          CI: false
      
      - name: Upload dos artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
      
      - name: Upload dos relatórios de teste
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: |
            frontend/coverage/
            frontend/test-results/
          retention-days: 7

  # 2. Análise de Segurança
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Executar auditoria de segurança
        run: |
          cd frontend
          npm audit --production || echo "Security vulnerabilities found"
      
      - name: Verificar vulnerabilidades em dependências
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'frontend'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # 3. Verificação de Performance
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit --no-fund
      
      - name: Analisar tamanho do bundle
        run: |
          npm run build -- --stats
          npx webpack-bundle-analyzer build/bundle-stats.json --mode static --report build/bundle-report.html || echo "No bundle stats found"
      
      - name: Upload do relatório de bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: frontend/build/bundle-report.html
          retention-days: 7

  # 4. Deploy para Preview (PRs)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Download dos artefatos de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
      
      - name: Deploy para Preview
        run: |
          echo "Deploying preview for PR #${{ github.event.pull_request.number }}"
          # Adicione aqui o comando específico do seu provedor
        env:
          PREVIEW_URL: "https://preview-${{ github.event.pull_request.number }}.seudominio.com"

  # 5. Deploy para Produção
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://seudominio.com
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Download dos artefatos de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
      
      - name: Deploy para Produção
        run: |
          echo "Deploying to production..."
          
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
